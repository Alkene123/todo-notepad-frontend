<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Notepad - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .landing {
            text-align: center;
            background: #fff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 36px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5b4cdb;
        }
        .btn.secondary {
            background: transparent;
            color: #6c5ce7;
            border: 2px solid #6c5ce7;
            margin-left: 10px;
        }
        .btn.secondary:hover {
            background: #6c5ce7;
            color: white;
        }
    </style>
</head>
<body>
    <div class="landing">
        <h1> Todo Notepad</h1>
        <p>Your simple todo app with authentication</p>
        <a href="fronted/login.html" class="btn">Login</a>
        <a href="fronted/register.html" class="btn secondary">Register</a>
        <script>
            // Auto-redirect to login after 3s
            setTimeout(() => {
                window.location.href = 'fronted/login.html';
            }, 3000);
        </script>
    </div>
</body>
