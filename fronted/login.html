<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(44, 62, 1, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color:black;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ae070738;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
    
        }
        button:hover {
            background: #5b4cdb;
        }
        p {
            text-align: center;
            margin-top: 20px;
            color:ash;
        }
        a {
            color: #6c5ce7;
            text-decoration: none;
        }
        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #28a745;
        }
        .error {
            background: #f8d7da;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Login</h1>
        <div id="message" class="message"></div>
        <form id="loginForm">
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <script>
    const CONFIG = {
        API_URL: 'https://basic-project-1.onrender.com'  // Your backend URL
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
            email: formData.get('email'),
            password: formData.get('password')
        };
        
        const messageDiv = document.getElementById('message');
        
        try {
            // ✅ FIXED: Use CONFIG.API_URL instead of API_URL
            const response = await fetch(`${CONFIG.API_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                if (result.token) {
                    localStorage.setItem('token', result.token);
                }
                messageDiv.textContent = 'Login successful! Redirecting to todos...';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'todo.html';
                }, 1500);
            } else {
                messageDiv.textContent = result.message || 'Login failed';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        } catch (error) {
            messageDiv.textContent = 'Error: ' + error.message;
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
